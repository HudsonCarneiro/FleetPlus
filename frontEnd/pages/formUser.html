
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>frota-carros-login</title>
    <link rel="stylesheet" href="..\src\css\style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>

    <div >
        <ul class="nav justify-content-center" >
            <li class="nav-item">
              <a class="nav-link" href="index.html" style="color:rgb(12, 12, 12)">Login</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="formUser.html" style="color:rgb(12, 12, 12)">Cadastrar</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="sobre.html" style="color:rgb(12, 12, 12)">Sobre</a>
            </li>
    </div>


    <div class="container">
        <form class="login-box" id="formUser">
            
            <div style="text-align: center;">
                <h3>Cadastrar</h3>
            </div>
            <label for="name">Nome</label>
            <input type="text" id="name-user" class="container-input" placeholder="name" required>

            <label for="cpf">CPF</label>
            <input type="text" id="cpf-user" class="container-input" placeholder="CPF" 
            required pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" title="Formato: 123.456.789-01">

            <label for="phone">Telefone</label>
            <input type="tel" id="phone-user" class="container-input" aria-placeholder="phone" placeholder="(XX) XXXXX-XXXX" required>

            <label for="cep">CEP</label>
            <input type="text" id="cep-user" class="container-input" placeholder="CEP" required pattern="\d{5}-\d{3}" title="Formato: 12345-678">    

            <label for="road">Rua</label>
            <input type="text" id="road-user" class="container-input" placeholder="road" required>

            <label for="complement">Complemento</label>
            <input type="text" id="complement-user" class="container-input" placeholder="complement" required>

            <label for="number">Numero</label>
            <input type="text" id="number-user" class="container-input" placeholder="number" required>

            <label for="city">Cidade</label>
            <input type="text" id="city-user" class="container-input" placeholder="city" required>

            <label for="Estado">Estado</label>
            <input type="text" id="state-user" class="container-input" placeholder="state" required>

            <label for="email">Email</label>
            <input type="email" id="email-user" class="container-input" placeholder="email" required>

            <label for="password">Senha</label>
            <input type="password" id="password-user" class="container-input" placeholder="password"  required minlength="6">

            <input type="submit" class="button" value="Enviar">
        </form>
    </div>
    <script type="module" src="../src/js/controller/UserController.js"></script>
</body>
</html>
