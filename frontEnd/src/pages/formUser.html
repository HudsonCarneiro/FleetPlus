<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FleetPlus-Cadastro</title>
    <link rel="stylesheet" href="..\css\form.css">
    <link rel="stylesheet" href="..\css\navbar.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body class="background">
    <div id="navbar-static"></div>

    <!-- Formulário de Cadastro -->
    <div class="container form-container mt-5 pt-5">
        <div class="card p-4">
            <div class="card-body">
                <h3 class="text-center">Cadastrar Usuário</h3>

                <form id="formUser" class="mt-4">
                    <div class="mb-3">
                        <label for="name-user" class="form-label">Nome</label>
                        <input type="text" id="name-user" class="form-control" placeholder="Nome completo" required>
                    </div>

                    <div class="mb-3">
                        <label for="cpf-user" class="form-label">CPF</label>
                        <input type="text" id="cpf-user" class="form-control" placeholder="123.456.789-01">
                    </div>

                    <div class="mb-3">
                        <label for="phone-user" class="form-label">Telefone</label>
                        <input type="tel" id="phone-user" class="form-control" placeholder="(XX) XXXXX-XXXX" required>
                    </div>

                    <div class="mb-3">
                        <label for="cep-user" class="form-label">CEP</label>
                        <input type="text" id="cep-user" class="form-control" placeholder="12345-678">
                    </div>

                    <div class="mb-3">
                        <label for="road-user" class="form-label">Rua</label>
                        <input type="text" id="road-user" class="form-control" placeholder="Nome da rua" required>
                    </div>

                    <div class="mb-3">
                        <label for="complement-user" class="form-label">Complemento</label>
                        <input type="text" id="complement-user" class="form-control" placeholder="Complemento" required>
                    </div>

                    <div class="mb-3">
                        <label for="number-user" class="form-label">Número</label>
                        <input type="text" id="number-user" class="form-control" placeholder="Número" required>
                    </div>

                    <div class="mb-3">
                        <label for="city-user" class="form-label">Cidade</label>
                        <input type="text" id="city-user" class="form-control" placeholder="Cidade" required>
                    </div>

                    <div class="mb-3">
                        <label for="state-user" class="form-label">Estado</label>
                        <input type="text" id="state-user" class="form-control" placeholder="Estado" required>
                    </div>

                    <div class="mb-3">
                        <label for="email-user" class="form-label">Email</label>
                        <input type="email" id="email-user" class="form-control" placeholder="email@exemplo.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="password-user" class="form-label">Senha</label>
                        <input type="password" id="password-user" class="form-control" placeholder="Senha" required minlength="6">
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
                </form>
            </div>
        </div>
    </div>
    <script type="module" src="../js/controller/userController.js"></script>
    <script type="module" src="../js/components/navBar.js"></script>
    <script type="module" src="../js/utils/cepUtils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
