<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/form.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Dashboard</title>
</head>
<body class="background">
   <!-- Navbar estática -->
   <div id="navbar-static" class="bg-dark text-white py-2 px-3">
      <h5>Minha Navbar</h5>
   </div>

    <div style="display: flex; flex-direction: row;">
        <!-- Menu lateral -->
        <nav class="d-flex flex-column bg-light border-end shadow-sm p-3" style="position: fixed; top: 56px; left: 0; height: calc(100% - 56px); width: 250px; overflow-y: auto;">
            <h5 class="text-secondary">Menu</h5>
            <ul class="nav flex-column">
                <li class="nav-item mt-3">
                    <h6 class="text-muted">Motoristas</h6>
                    <button id="open-driverModal" class="btn btn-outline-primary btn-sm w-100 mb-1">Ver Motoristas</button>
                    <button id="open-driverModal" class="btn btn-outline-secondary btn-sm w-100">Cadastrar Motorista</button>
                </li>
                <li class="nav-item mt-3">
                    <h6 class="text-muted">Veículos</h6>
                    <button id="open-vehicleModal" class="btn btn-outline-primary btn-sm w-100 mb-1">Ver Veículos</button>
                    <button id="open-vehicleModal" class="btn btn-outline-secondary btn-sm w-100">Cadastrar Veículo</button>
                </li>
                <li class="nav-item mt-3">
                    <h6 class="text-muted">Clientes</h6>
                    <button id="open-Modal" class="btn btn-outline-primary btn-sm w-100 mb-1">Ver Clientes</button>
                    <button id="open-Modal" class="btn btn-outline-secondary btn-sm w-100">Cadastrar Cliente</button>
                </li>
                <li class="nav-item mt-3">
                    <h6 class="text-muted">Abastecimentos</h6>
                    <button id="open-Modal" class="btn btn-outline-primary btn-sm w-100 mb-1">Ver Abastecimentos</button>
                    <button id="open-Modal" class="btn btn-outline-secondary btn-sm w-100">Registrar Abastecimento</button>
                </li>
            </ul>
        </nav>

        <!-- Conteúdo principal -->
        <div id="control-panel" class="container">
            <h1>Bem-vindo ao Dashboard</h1>
            <p id="panel-description">Selecione uma opção no menu lateral para começar.</p>

            <!-- Conteúdo dinâmico do painel -->
            <div id="panel-content" class="panel-content">
                <!-- O conteúdo será alterado dinamicamente via JavaScript -->
            </div>
        </div>
    </div>

    <!-- Containers para modais, caso necessários -->
    <div id="driverModalContainer"></div>
    <div id="vehicleModalContainer"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../js/components/driverModal.js"></script>
    <script src="../js/components/vehicleModal.js"></script>
    <script src="../js/controller/driverController.js"></script>
    <script src="../js/controller/vehicleController.js"></script>
    <script src="../js/controller/dashboardController.js"></script>
    <script src="../js/components/navBar.js"></script>

</body>
</html>
