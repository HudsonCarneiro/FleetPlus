<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>frota-carros-login</title>
    <link rel="stylesheet" href="..\src\css\style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>

    <div >
        <ul class="nav justify-content-center" style="background-color:rgb(230,230,230);">
            <li class="nav-item">
                <a class="nav-link" href="dashboard.html" style="color:rgb(12, 12, 12)">Home</a>
              </li>
            <li class="nav-item">
              <a class="nav-link" href="login.html" style="color:rgb(12, 12, 12)">Login</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="formUser.html" style="color:rgb(12, 12, 12)">Cadastrar</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="sobre.html" style="color:rgb(12, 12, 12)">Sobre</a>
            </li>
    </div>

    <div class="container">
        <form class="login-box" id="formUser">
            
            <div style="text-align: center;">
                <h3>Cadastrar</h3>
            </div>
            <label for="name">Nome</label>
            <input type="text" id="name-user" class="container-input" placeholder="name" required>

            <label for="cpf">CNH</label>
            <input type="text" id="cnh-driver" class="container-input" placeholder="cnh" required>

            <label for="phone">Telefone</label>
            <input type="tel" id="phone-driver" class="container-input" aria-placeholder="phone" placeholder="(XX) XXXXX-XXXX" required>

            <label for="birthDate">Data de Nascimento</label>
            <input type="date" id="birthDate-driver" class="container-input" placeholder="birthDate" required>

            <input type="submit" class="button" value="Enviar">

        </form>
        <div id="resultado"></div>


        <script type="module" src="/backEnd/controller/driverController.js"></script>
    </div>
</body>
</html>
