<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>frota-carros-login</title>
    <link rel="stylesheet" href="..\css\form.css">
    <link rel="stylesheet" href="..\css\navbar.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body class="background">
    <div id="navbar-static"></div>
    <div class="container form-container mt-5 pt-5">
        <div class="card p-4">
            <div class="card-body">
                <h3 class="text-center">Entrar</h3>
                <form id="formLogin" class="mt-4">

                <div class="mb-3">
                    <label for="email">Email</label>
                    <input type="email" id="email-login" class="form-control" placeholder="email@exemplo.com" required>
                </div>

                <div class="mb-3">
                    <label for="senha">senha</label>
                    <input type="password" id="password-login" class="form-control" placeholder="******" required>
                </div>    

                <button type="submit" class="btn btn-primary w-100">Enviar</button>
                
                <p class="mb-3">Não tem uma conta?
                    <a href="formUser.html" style="color: #0d6efd; font-size: 12;" >Cadastre-se</a>
                </p>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/components/navBar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/controller/loginController.js"></script>
</body>
</html>
